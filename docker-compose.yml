services:
  ecom-ms-eco-discovery-service:
    build:  ./discovery-service
    container_name: ecom-ms-eco-discovery-service
    ports:
      - '8761:8761'
    expose:
      - '8761'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 4
  ecom-ms-eco-config-service:
    build: ./config-service
    container_name: ecom-ms-eco-config-service
    ports:
      - '9999:9999'
    expose:
      - '9999'
    environment:
      - DISCOVERY_SERVICE_URL=http://ecom-ms-eco-discovery-service:8761/eureka/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9999/actuator/health" ]
      interval: 10s
      retries: 4
    depends_on:
      ecom-ms-eco-discovery-service:
          condition: service_healthy
  ecom-ms-eco-gateway-service:
    build: ./gateway-service
    container_name: ecom-ms-eco-gateway-service
    ports:
      - '8888:8888'
    expose:
      - '8888'
    environment:
      - DISCOVERY_SERVICE_URL=http://ecom-ms-eco-discovery-service:8761/eureka/
    depends_on:
      ecom-ms-eco-config-service:
        condition: service_healthy
  ecom-ms-eco-customer-service:
    build: ./customer-service
    container_name: ecom-ms-eco-customer-service
    ports:
      - '8081:8081'
    expose:
      - '8081'
    environment:
      - DISCOVERY_SERVICE_URL=http://ecom-ms-eco-discovery-service:8761/eureka/
      - CONFIG_SERVICE=http://ecom-ms-eco-config-service:9999
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 10s
      retries: 4
      start_period: 50s
    depends_on:
      ecom-ms-eco-config-service:
        condition: service_healthy
  ecom-ms-eco-inventory-service:
    build: ./inventory-service
    container_name: ecom-ms-eco-inventory-service
    ports:
      - '8082:8082'
    expose:
      - '8082'
    environment:
      - DISCOVERY_SERVICE_URL=http://ecom-ms-eco-discovery-service:8761/eureka/
      - CONFIG_SERVICE=http://ecom-ms-eco-config-service:9999
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 10s
      retries: 4
      start_period: 50s
    depends_on:
      ecom-ms-eco-config-service:
        condition: service_healthy
  ecom-ms-eco-billing-service:
    build: ./billing-service
    container_name: ecom-ms-eco-billing-service
    ports:
      - '8083:8083'
    expose:
      - '8083'
    environment:
      - DISCOVERY_SERVICE_URL=http://ecom-ms-eco-discovery-service:8761/eureka/
      - CONFIG_SERVICE=http://ecom-ms-eco-config-service:9999
    depends_on:
      ecom-ms-eco-customer-service:
        condition: service_healthy
      ecom-ms-eco-inventory-service:
        condition: service_healthy
